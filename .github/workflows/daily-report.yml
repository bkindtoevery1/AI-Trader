name: Daily Backtest Report

on:
  workflow_dispatch:
  schedule:
    - cron: "10 21 * * 1-5"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Generate daily report
        run: ai-trader daily --data data/sample_candles.csv --report-dir reports --dashboard web/public/dashboard-data.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-trader-report
          path: |
            reports/
            web/public/dashboard-data.json

